<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Hub</title>
    <!-- Lucide Icons for clean, modern iconography -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="msapplication-TileColor" content="#0ea5e9">
    <meta name="msapplication-config" content="/browserconfig.xml">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Justin's Hub">
    <meta name="theme-color" content="#0ea5e9">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f1115 0%, #161920 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.07);
            --card-hover-bg: rgba(255, 255, 255, 0.07);
            --card-hover-border: rgba(255, 255, 255, 0.15);
            
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Premium Accent Colors */
            --accent-glow: rgba(99, 102, 241, 0.15);
            --accent-line: #6366f1;
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            overflow-x: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 50%;
        }

        /* Subtle ambient background glow */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, transparent 70%);
            bottom: -10%;
            right: -10%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 800px;
            z-index: 1;
        }

        /* Profile Header Design */
        header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: transparent;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            box-shadow: none;
            position: relative;
        }

        .profile-avatar::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 400;
            max-width: 450px;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* Project Grid/List Layout */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Sleek Button Card Design */
        .project-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 2rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            transition: var(--transition);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        /* Subtle interactive lighting border effect */
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-line);
            opacity: 0;
            transition: var(--transition);
        }

        .project-card:hover {
            background: var(--card-hover-bg);
            border-color: var(--card-hover-border);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2), 0 0 40px var(--accent-glow);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .icon-wrapper {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .project-card:hover .icon-wrapper {
            color: var(--accent-line);
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
            transform: scale(1.05);
        }

        .card-info h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            letter-spacing: -0.01em;
            transition: var(--transition);
        }

        .card-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .arrow-icon {
            color: var(--text-muted);
            transform: translateX(-5px);
            opacity: 0;
            transition: var(--transition);
        }

        .project-card:hover .arrow-icon {
            opacity: 1;
            transform: translateX(0);
            color: var(--text-primary);
        }

        /* Minimal Footer */
        footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }
    
        /* Top-left premium Home button */
        .home-button { position: fixed; top: 20px; left: 20px; z-index: 9999; display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: linear-gradient(90deg, rgba(99,102,241,0.12), rgba(14,165,233,0.06)); border: 1px solid rgba(255,255,255,0.06); color: #fff; border-radius: 12px; text-decoration: none; font-weight: 600; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); box-shadow: 0 10px 30px rgba(2,6,23,0.6), 0 0 30px rgba(99,102,241,0.08); transition: transform .18s ease, box-shadow .18s ease; }
        .home-button .home-icon svg { display: block; color: #fff; width: 18px; height: 18px; }
        .home-button .home-text { font-size: 0.95rem; letter-spacing: 0.02em; margin-left: 6px; }
        .home-button:hover { transform: translateY(-3px); box-shadow: 0 18px 40px rgba(2,6,23,0.7), 0 0 48px rgba(99,102,241,0.16); }

</style>
</head>
